<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel ="stylesheet" href = "CSS/style.css">
    <title>Pomodoro</title>
</head>
<body>
    <header>
        <h1 class = "default_look">Pomofocus</h1>
        <nav>

            <ul class = "header_menu">

                <li><button class = "button_menu" >Report</button></li>
                <li><button class = "button_menu">Setting</button></li>
                <li><button class = "button_menu">Logo</button></li>

            </ul>

        </nav>
    </header>
    <section class = "main_section">

        <ul class = "main_menu">

            <li><button class = "main_button_menu"><h2  class = "pomodoro"><div class = "pomodoro_text">Pomodoro</div></h2></button></li>
            <li><button class = "main_button_menu"><h2><div class = "pomodoro_text">Short Break</div></h2></button></li>
            <li><button class = "main_button_menu"><h2><div class = "pomodoro_text">Long Break</div></h2></button></li>

        </ul>

        <span class = "timer">25:00</span>

       

        <div class = "start_button_div"><button class = "start_button" >START</button></div>

    </section>
    <span class = "number_1">#1</span>
    <span class = "time_to_focus">Time to focus!</span>
    <section class = "lower_section">
        <span class = "tasks">Tasks</span>
        <span class = "three_dots"><button class = "three_dots_button"><span class ="three_dots_clean">⋮</span></button></span>
    </section>
    <div class = "add_task"><button class = "add_task_button"><span>Add Task</span></button></div>
    
</body>
</html>
