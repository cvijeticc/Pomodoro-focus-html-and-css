<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel ="stylesheet" href = "CSS/style.css">
    <title>Pomodoro</title>
</head>
<body>
    <header>
        <h1 class="default_look">Pomofocus</h1>
        <nav>

            <ul class="header_menu">

                <li><button class = "button_menu" >Report</button></li>
                <li><button class = "button_menu">Setting</button></li>
                <li><button class = "button_menu">Logo</button></li>

            </ul>

        </nav>
    </header>
    <div class="main_wrapper">
        <main class="main">
        <section class = "main_section">

        <div class = "main_menu">

            
                <button class = "main_button_menu pomodoro">
                    Pomodoro
                </button>
            
            <button class = "main_button_menu">
                Short Break
            </button>
            <button class = "main_button_menu">
                Long Break
            </button>

        </div>

        <span class = "timer">25:00</span>
        
            <button class = "start_button" >
                START
            </button>

    </section>
    <div>
        <div class = "number_1">#1</div>
        <div class = "time_to_focus">Time to focus!</div>
    </div>
    <div class = "lower_section">
        <span class = "tasks">Tasks</span>
        <span class = "three_dots"><button class = "three_dots_button"><span class ="three_dots_clean">⋮</span></button></span>
    </div>
    <div class = "add_task"><button class = "add_task_button"><span>Add Task</span></button></div>
    </main>
    </div>
    
</body>
</html>
